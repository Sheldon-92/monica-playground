<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 620" role="img" aria-labelledby="title desc">
  <title id="title">Friendly education consultant avatar placeholder</title>
  <desc id="desc">A warm watercolor avatar of a female figure with a book and pen.</desc>
  <defs>
    <filter id="paint" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.019" numOctaves="4" seed="27" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" result="wobble"/>
      <feGaussianBlur in="wobble" stdDeviation=".35"/>
    </filter>
    <filter id="wash" x="-24%" y="-24%" width="148%" height="148%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="5" seed="61" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="18"/>
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="4" result="paper"/>
      <feColorMatrix in="paper" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <style>
      .ink { stroke: #5b4a3d; stroke-linecap: round; stroke-linejoin: round; }
      .line { fill: none; stroke: #5b4a3d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; opacity: .72; }
    </style>
  </defs>
