<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" role="img" aria-labelledby="title desc">
  <title id="title">Hand drawn wavy section divider</title>
  <desc id="desc">A warm wavy line with small watercolor dots.</desc>
  <defs>
    <filter id="organic" x="-5%" y="-25%" width="110%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.7"/>
    </filter>
    <filter id="dotBleed" x="-40%" y="-40%" width="180%" height="180%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" seed="11" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"/>
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>
  <rect width="1200" height="120" fill="none"/>
  <g filter="url(#organic)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M35 61c75-39 136-40 197-3 62 37 126 36 192-2 72-42 139-36 202 10 62 45 133 43 212-7 70-45 142-42 216 8 42 28 78 31 113 9" stroke="#E8725A" stroke-width="6" opacity=".72"/>
    <path d="M41 69c79-33 142-30 201 7 60 38 121 31 187-6 75-42 143-33 203 11 65 47 137 36 211-10 66-42 136-38 211 10 44 29 81 30 111 4" stroke="#F5A623" stroke-width="3.2" opacity=".52"/>
  </g>
  <g filter="url(#dotBleed)" opacity=".9">
    <circle cx="90" cy="39" r="9" fill="#F5A623" opacity=".72"/>
    <circle cx="173" cy="84" r="6" fill="#6B9E7A" opacity=".64"/>
    <circle cx="304" cy="42" r="7" fill="#E8725A" opacity=".68"/>
    <circle cx="432" cy="83" r="10" fill="#F5A623" opacity=".58"/>
    <circle cx="559" cy="41" r="6" fill="#E8725A" opacity=".64"/>
    <circle cx="683" cy="91" r="8" fill="#6B9E7A" opacity=".58"/>
    <circle cx="812" cy="38" r="7" fill="#F5A623" opacity=".68"/>
    <circle cx="943" cy="83" r="9" fill="#E8725A" opacity=".58"/>
    <circle cx="1082" cy="43" r="6" fill="#6B9E7A" opacity=".66"/>
  </g>
</svg>
