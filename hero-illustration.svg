<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">Warm storybook education illustration</title>
  <desc id="desc">Open books, colorful pencils, small stars, a graduation cap, and soft organic watercolor shapes.</desc>
  <defs>
    <filter id="paperTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="4" seed="18" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="wobble" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3.2"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 0.34 0 0 0 0 0.22 0 0 0 0 0.12 0 0 0 0.18 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ink { stroke: #5b4a3d; stroke-linecap: round; stroke-linejoin: round; }
      .sketch { fill: none; stroke: #6a5142; stroke-width: 4.5; stroke-linecap: round; stroke-linejoin: round; opacity: .72; }
      .thin { fill: none; stroke: #6a5142; stroke-width: 2.7; stroke-linecap: round; stroke-linejoin: round; opacity: .68; }
    </style>
  </defs>

